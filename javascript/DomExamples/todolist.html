<!DOCTYPE html>
<html>
<head>
<title>To-Do List</title>

<style>

button, .selected, .options div, li {
    transition: all 0.25s ease;
}


button:hover {
    transform: translateY(-2px) scale(1.03);
    background: linear-gradient(135deg, #7c83ff, #38e0ff);
    box-shadow: 
        0 6px 18px rgba(99,102,241,0.5),
        inset 0 1px 0 rgba(255,255,255,0.2);
}

.selected:hover {
    background: rgba(255,255,255,0.12);
    box-shadow: 
        inset 0 1px 0 rgba(255,255,255,0.2),
        0 4px 12px rgba(0,0,0,0.3);
}


.options div:hover {
    background: rgba(255,255,255,0.12);
    backdrop-filter: blur(10px);
    transform: translateX(3px);
}


li:hover {
    transform: translateY(-3px) scale(1.01);
    background: rgba(255,255,255,0.1);
    box-shadow: 
        0 6px 20px rgba(0,0,0,0.4),
        inset 0 1px 0 rgba(255,255,255,0.15);
}


.actions span:hover {
    transform: scale(1.2);
    filter: brightness(1.3);
}

:root {
    --bg1:#0b1220;
    --bg2:#1e293b;
    --accent1:#6366f1;
    --accent2:#22d3ee;
    --text:#e2e8f0;
}

body {
    margin:0;
    font-family:"Inter",sans-serif;
    background: linear-gradient(135deg,var(--bg1),var(--bg2));
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    color:var(--text);
    position:relative;
}

body::before, body::after{
    content:"";
    position:absolute;
    width:300px;
    height:300px;
    filter:blur(120px);
    opacity:0.3;
    z-index:-1;
}

body::before{background:#6366f1; top:10%; left:20%;}
body::after{background:#22d3ee; bottom:10%; right:20%;}

.app{
    width:430px;
    max-width:95%;
    padding:20px;
    border-radius:18px;
    background:rgba(255,255,255,0.06);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,0.1);
    box-shadow:0 10px 40px rgba(0,0,0,0.5);
}

h1{text-align:center;}

.stats{
    display:flex;
    justify-content:space-between;
    font-size:12px;
    margin-bottom:10px;
}

.input-area{
    display:flex;
    gap:6px;
}

input{
    flex:1;
    padding:8px;
    border:none;
    border-radius:6px;
    background:rgba(255,255,255,0.1);
    color:white;
}

button{
    background:linear-gradient(135deg,var(--accent1),var(--accent2));
    border:none;
    padding:8px 12px;
    border-radius:6px;
    color:white;
    cursor:pointer;
}

.dropdown { position: relative; width: 110px; }

.selected {
    padding: 8px;
    border-radius: 6px;
    background: rgba(30, 41, 59, 0.7);
    color: #f1f5f9;
    cursor: pointer;
    text-align: center;
    border: 1px solid rgba(255,255,255,0.15);
}

.options {
    position: absolute;
    top: 110%;
    width: 100%;
    background: rgba(15, 23, 42, 0.9);
    border-radius: 8px;
    display: none;
    overflow: hidden;
    z-index: 10;
}

.options div {
    padding: 8px;
    display: flex;
    justify-content: space-between;
    cursor: pointer;
}

.options div:hover { background: rgba(255,255,255,0.08); }

.high::after { content:"●"; color:#f87171;}
.medium::after { content:"●"; color:#fbbf24;}
.low::after { content:"●"; color:#34d399;}

ul{list-style:none;padding:0;margin-top:10px;}

li{
    background:rgba(255,255,255,0.05);
    padding:10px;
    border-radius:8px;
    margin-bottom:8px;
    display:flex;
    justify-content:space-between;
}

.high{border-left:4px solid #f87171;}
.medium{border-left:4px solid #fbbf24;}
.low{border-left:4px solid #34d399;}

.completed{text-decoration:line-through;opacity:0.5;}

.actions span{margin-left:8px;cursor:pointer;}

.filters{
    display:flex;
    gap:5px;
    margin-top:10px;
}
.filters button{
    flex:1;
    background:rgba(255,255,255,0.1);
}
</style>
</head>

<body>

<div class="app">
<h1>To-Do List</h1>

<div class="stats">
<span id="total"></span>
<span id="completed"></span>
<span id="pending"></span>
</div>

<div class="input-area">
<input id="taskInput" placeholder="Add task..." onkeypress="handleKey(event)">

<div class="dropdown">
    <div class="selected" onclick="toggleDropdown()">High</div>
    <div class="options" id="options">
        <div class="high" onclick="selectPriority(3,'High')">High</div>
        <div class="medium" onclick="selectPriority(2,'Medium')">Medium</div>
        <div class="low" onclick="selectPriority(1,'Low')">Low</div>
    </div>
</div>

<button onclick="addTask()">+</button>
</div>

<div class="filters">
<button onclick="setFilter('all')">All</button>
<button onclick="setFilter('completed')">Done</button>
<button onclick="setFilter('pending')">Pending</button>
</div>

<ul id="list"></ul>
</div>

<script>
let tasks = JSON.parse(localStorage.getItem("tasks")) || [];
let filter="all";
let selectedPriority=3;

function save(){
    localStorage.setItem("tasks",JSON.stringify(tasks));
}

function addTask(){
    let input=document.getElementById("taskInput");
    if(input.value.trim()=="") return;

    tasks.push({
        text:input.value,
        priority:selectedPriority,
        completed:false
    });

    input.value="";
    save();
    renderTasks();
}

function renderTasks(){
    let list=document.getElementById("list");
    list.innerHTML="";

    let filtered=tasks.filter(t=>{
        return (
        filter=="all" ||
        (filter=="completed" && t.completed) ||
        (filter=="pending" && !t.completed));
    });

    filtered.sort((a,b)=>b.priority-a.priority);

    filtered.forEach(t=>{
        let li=document.createElement("li");
        li.classList.add(getClass(t.priority));
        if(t.completed) li.classList.add("completed");

        let realIndex = tasks.indexOf(t);

        li.innerHTML=`
        <span>${t.text}</span>
        <div class="actions">
            <span onclick="toggle(${realIndex})">✔</span>
            <span onclick="del(${realIndex})">✖</span>
        </div>`;

        list.appendChild(li);
    });

    document.getElementById("total").innerText="Total "+tasks.length;
    document.getElementById("completed").innerText="Done "+tasks.filter(t=>t.completed).length;
    document.getElementById("pending").innerText="Left "+tasks.filter(t=>!t.completed).length;
}

function getClass(p){
    return p==3?"high":p==2?"medium":"low";
}

function toggle(i){
    tasks[i].completed=!tasks[i].completed;
    save();
    renderTasks();
}

function del(i){
    tasks.splice(i,1);
    save();
    renderTasks();
}

function setFilter(f){
    filter=f;
    renderTasks();
}

function handleKey(e){
    if(e.key==="Enter") addTask();
}

function toggleDropdown(){
    let opt=document.getElementById("options");
    opt.style.display=opt.style.display==="block"?"none":"block";
}

function selectPriority(val,text){
    selectedPriority=val;
    document.querySelector(".selected").innerText=text;
    document.getElementById("options").style.display="none";
}

document.addEventListener("click",function(e){
    let d=document.querySelector(".dropdown");
    if(!d.contains(e.target)){
        document.getElementById("options").style.display="none";
    }
});

renderTasks();
</script>

</body>
</html>
