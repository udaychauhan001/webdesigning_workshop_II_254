<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Experiment 6 - DOM Manipulation</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <h1 id="mainHeading">Welcome to My Webpage</h1>

    <input type="text" id="messageInput" placeholder="Enter your message">

    <p id="para">This is a sample paragraph.</p>

    <div class="buttons">
        <button id="changeTextBtn">Change Heading Text</button>
        <button id="bgColorBtn">Change Background Color</button>
        <button id="fontSizeBtn">Change Font Size</button>
        <button id="toggleParaBtn">Show/Hide Paragraph</button>
        <button id="resetBtn">Reset Page</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
